on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libcanberra-gtk3-module \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgirepository1.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            gir1.2-webkit2-4.1 \
            patchelf
      - if: runner.os == 'Windows'
        shell: bash
        run:
          rustup target add x86_64-pc-windows-gnu
      - shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install briefcase
      - shell: bash
        run: |
          make package OST=${{ matrix.target }} \
            ${{ matrix.target == 'linux' && 'PACKAGE_ARGS="linux appimage --no-docker"' || '' }}
      - name: Show Briefcase log
        shell: bash
        if: failure()
        run: |
          ls -la src
          echo "==== LOG ===="
          cat logs/briefcase.*.build.log || true
          echo "python:"
          which python
          python --version

          echo "python3:"
          which python3
          python3 --version
      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ runner.os }}
          path: dist/*
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish alpha
        run: |
          gh release delete alpha -y || true
          gh release create alpha artifacts/**/* \
            --title "Alpha build" \
            --notes "Auto build from ${{ github.sha }}" \
            --prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
